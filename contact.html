<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Taiwan Halal Trip</title>
    <style>
        /* Basic Reset & Styling */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: #2d5a27; /* A subtle Islamic/Nature green */
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .info-section {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .info-item {
            margin-bottom: 20px;
        }

        .info-item strong {
            display: block;
            color: #2d5a27;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-item p {
            margin: 0;
            font-size: 1.1rem;
        }

        a {
            color: #2196F3;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h1>Contact Us</h1>
        <p class="subtitle">Plan your perfect Halal-friendly journey across Taiwan with us.</p>

        <div class="info-section">
            <div class="info-item">
                <strong>Email Address</strong>
                <p><a href="mailto:mike@taiwanhalaltrip.com">mike@taiwanhalaltrip.com</a></p>
            </div>

            <div class="info-item">
                <strong>Company Address</strong>
                <p>
                    2F No. 217, Section 2, Hoping E Road,<br>
                    DaAnn District, Taipei City 106,<br>
                    Taiwan
                </p>
            </div>
        </div>

        <div class="footer">
            &copy; 2026 Taiwan PoPo Travel Service Ltd.
        </div>
    </div>

</body>
</html>
